name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Node 24 · build and test
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        # Prisma/Nest/BullMQ are future scaffolding and are not imported by the
        # current JSON-backed runtime. Avoid running their install hooks; the
        # only active generated asset is built explicitly in the next step.
        run: npm ci --ignore-scripts

      - name: Check changed-file whitespace
        shell: bash
        run: |
          if [[ -n "${{ github.base_ref }}" ]]; then
            git diff --check "origin/${{ github.base_ref }}...HEAD"
          else
            git diff-tree --check --no-commit-id -r HEAD
          fi

      - name: Build Milkdown editor bundle
        run: npm run build:editor-bundle -w @study-accelerator/web

      - name: Run test suites
        run: npm test

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
